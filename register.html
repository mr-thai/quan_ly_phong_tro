<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đăng ký - PHONGTRO247</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body data-page="register">
  <nav class="navbar bg-white sticky-top"><div class="container"><a class="navbar-brand" href="index.html">PHONGTRO247</a><a href="login.html" class="btn btn-outline-primary">Đăng nhập</a></div></nav>
  <main class="auth-wrapper">
    <div class="container"><div class="row justify-content-center"><div class="col-lg-6 col-md-8">
      <form id="registerForm" class="form-card">
        <h2 class="fw-bold mb-3">Đăng ký tài khoản</h2>
        <div class="row g-3">
          <div class="col-12"><label class="form-label">Họ và tên</label><input class="form-control" name="name"></div>
          <div class="col-md-6"><label class="form-label">Email</label><input class="form-control" name="email"></div>
          <div class="col-md-6"><label class="form-label">Số điện thoại</label><input class="form-control" name="phone"></div>
          <div class="col-md-6"><label class="form-label">Mật khẩu</label><input type="password" class="form-control" name="password"></div>
          <div class="col-md-6"><label class="form-label">Nhập lại mật khẩu</label><input type="password" class="form-control" name="confirmPassword"></div>
          <div class="col-12"><button class="btn btn-primary w-100">Đăng ký</button></div>
        </div>
      </form>
    </div></div></div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="assets/js/main.js"></script>
</body>
</html>
