<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đổi mật khẩu - PHONGTRO247</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body data-page="password">
  <nav class="navbar bg-white sticky-top"><div class="container"><a class="navbar-brand" href="index.html">PHONGTRO247</a><a class="btn btn-outline-primary" href="account.html">Tài khoản</a></div></nav>
  <main class="auth-wrapper"><div class="container"><div class="row justify-content-center"><div class="col-lg-5">
    <form id="changePasswordForm" class="form-card">
      <h2 class="fw-bold mb-3">Đổi mật khẩu</h2>
      <div class="mb-3"><label class="form-label">Mật khẩu hiện tại</label><input type="password" class="form-control" name="currentPassword"></div>
      <div class="mb-3"><label class="form-label">Mật khẩu mới</label><input type="password" class="form-control" name="newPassword"></div>
      <div class="mb-3"><label class="form-label">Nhập lại mật khẩu mới</label><input type="password" class="form-control" name="confirmPassword"></div>
      <button class="btn btn-primary w-100">Lưu mật khẩu</button>
    </form>
  </div></div></div></main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="assets/js/main.js"></script>
</body>
</html>
