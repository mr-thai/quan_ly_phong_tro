<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Báo cáo đã thuê - PHONGTRO247</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body data-page="report">
  <nav class="navbar bg-white sticky-top"><div class="container"><a class="navbar-brand" href="index.html">PHONGTRO247</a><a class="btn btn-outline-primary" href="search.html">Tìm phòng</a></div></nav>
  <main class="container py-5">
    <div class="row justify-content-center"><div class="col-lg-7">
      <form id="reportForm" class="form-card">
        <h2 class="fw-bold mb-3">Gửi báo cáo đã thuê</h2>
        <div class="row g-3">
          <div class="col-md-6"><label class="form-label">Họ tên người gửi</label><input class="form-control" name="name"></div>
          <div class="col-md-6"><label class="form-label">Số điện thoại</label><input class="form-control" name="phone"></div>
          <div class="col-12"><label class="form-label">Email</label><input class="form-control" name="email"></div>
          <div class="col-12"><label class="form-label">Chọn phòng trọ đã thuê</label><select id="reportRoom" class="form-select" name="room"></select></div>
          <div class="col-12"><label class="form-label">Nội dung báo cáo</label><textarea class="form-control" rows="5" name="message"></textarea></div>
          <div class="col-12"><button class="btn btn-danger">Gửi báo cáo</button></div>
        </div>
      </form>
    </div></div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="assets/js/main.js"></script>
</body>
</html>
