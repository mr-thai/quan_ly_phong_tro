<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tìm kiếm phòng trọ - PHONGTRO247</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body data-page="search">
  <nav class="navbar navbar-expand-lg bg-white sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">PHONGTRO247</a>
      <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#mainNav"><span class="navbar-toggler-icon"></span></button>
      <div id="mainNav" class="collapse navbar-collapse">
        <ul class="navbar-nav mx-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Trang chủ</a></li>
          <li class="nav-item"><a class="nav-link active" href="search.html">Tìm kiếm</a></li>
          <li class="nav-item"><a class="nav-link" href="post-create.html">Đăng tin</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Liên hệ</a></li>
        </ul>
        <div data-auth-area></div>
      </div>
    </div>
  </nav>
  <main class="container py-5">
    <div class="row g-4">
      <div class="col-lg-3">
        <form id="searchForm" class="filter-panel p-3">
          <h5 class="fw-bold">Bộ lọc</h5>
          <div class="mb-3"><label class="form-label">Từ khóa</label><input class="form-control" name="keyword"></div>
          <div class="mb-3"><label class="form-label">Địa điểm</label><input class="form-control" name="location"></div>
          <div class="mb-3"><label class="form-label">Khoảng giá</label><select class="form-select" name="priceRange"><option value="">Tất cả</option><option value="low">Dưới 2 triệu</option><option value="mid">2 - 3 triệu</option><option value="high">Trên 3 triệu</option></select></div>
          <div class="mb-3"><label class="form-label">Diện tích</label><select class="form-select" name="areaRange"><option value="">Tất cả</option><option value="small">Dưới 20 m2</option><option value="medium">20 - 30 m2</option><option value="large">Trên 30 m2</option></select></div>
          <label class="form-label">Tiện ích</label>
          <div class="d-grid gap-1 mb-3">
            <label><input type="checkbox" name="utilities" value="Wifi"> Wifi</label><label><input type="checkbox" name="utilities" value="Máy lạnh"> Máy lạnh</label><label><input type="checkbox" name="utilities" value="Chỗ để xe"> Chỗ để xe</label><label><input type="checkbox" name="utilities" value="Gác lửng"> Gác lửng</label><label><input type="checkbox" name="utilities" value="Nhà vệ sinh riêng"> Nhà vệ sinh riêng</label><label><input type="checkbox" name="utilities" value="Không chung chủ"> Không chung chủ</label>
          </div>
          <button class="btn btn-primary w-100 mb-2">Tìm kiếm</button><button id="clearFilters" type="button" class="btn btn-outline-secondary w-100">Xóa bộ lọc</button>
        </form>
      </div>
      <div class="col-lg-9">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
          <h2 class="section-title mb-0">Kết quả tìm kiếm</h2>
          <div class="d-flex gap-2 align-items-center"><span id="resultCount" class="fw-bold"></span><select id="sortSelect" class="form-select"><option value="newest">Mới nhất</option><option value="priceAsc">Giá thấp đến cao</option><option value="priceDesc">Giá cao đến thấp</option><option value="areaDesc">Diện tích lớn nhất</option></select></div>
        </div>
        <div id="searchResults" class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4"></div>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="assets/js/main.js"></script>
</body>
</html>
