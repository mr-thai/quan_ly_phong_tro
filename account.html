<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tài khoản - PHONGTRO247</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body data-page="account">
  <nav class="navbar navbar-expand-lg bg-white sticky-top"><div class="container"><a class="navbar-brand" href="index.html">PHONGTRO247</a><div data-auth-area></div></div></nav>
  <main class="container py-5">
    <div class="row g-4">
      <div class="col-lg-4"><div class="info-card p-4 text-center"><img id="avatarPreview" class="avatar-preview mb-3" src="https://ui-avatars.com/api/?name=PHONGTRO247&background=0d6efd&color=fff" alt="Avatar"><h5 class="fw-bold">Vai trò: <span id="roleText">Người dùng</span></h5><a href="change-password.html" class="btn btn-outline-primary mt-2">Đổi mật khẩu</a></div></div>
      <div class="col-lg-8">
        <form id="accountForm" class="form-card">
          <h2 class="fw-bold mb-3">Thông tin tài khoản</h2>
          <div class="row g-3">
            <div class="col-md-6"><label class="form-label">Họ tên</label><input class="form-control" name="name"></div>
            <div class="col-md-6"><label class="form-label">Email</label><input class="form-control" name="email" readonly></div>
            <div class="col-md-6"><label class="form-label">Số điện thoại</label><input class="form-control" name="phone"></div>
            <div class="col-md-6"><label class="form-label">Đổi ảnh đại diện</label><input type="file" accept="image/*" class="form-control" name="avatar"></div>
            <div class="col-12"><label class="form-label">Địa chỉ</label><input class="form-control" name="address"></div>
            <div class="col-12"><button class="btn btn-primary">Lưu thay đổi</button></div>
          </div>
        </form>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="assets/js/main.js"></script>
</body>
</html>
