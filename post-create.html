<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đăng tin mới - PHONGTRO247</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body data-page="create">
  <nav class="navbar navbar-expand-lg bg-white sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">PHONGTRO247</a>
      <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#mainNav"><span class="navbar-toggler-icon"></span></button>
      <div id="mainNav" class="collapse navbar-collapse">
        <ul class="navbar-nav mx-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Trang chủ</a></li>
          <li class="nav-item"><a class="nav-link" href="search.html">Tìm kiếm</a></li>
          <li class="nav-item"><a class="nav-link active" href="post-create.html">Đăng tin</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Liên hệ</a></li>
        </ul>
        <div class="d-flex align-items-center gap-2">
          <a href="post-manage.html" class="btn btn-outline-primary">Quản lý tin</a>
          <div data-auth-area></div>
        </div>
      </div>
    </div>
  </nav>
  <main class="container py-5">
    <form id="postForm" class="form-card">
      <h2 class="fw-bold mb-3">Đăng tin phòng trọ</h2>
      <div class="row g-3">
        <div class="col-md-8"><label class="form-label">Tiêu đề</label><input class="form-control" name="title"></div>
        <div class="col-md-4"><label class="form-label">Tỉnh/thành hoặc khu vực</label><select class="form-select" name="location"><option>Gần Đại học Vinh</option><option>Phường Bến Thủy</option><option>Phường Trường Thi</option><option>Phường Hưng Dũng</option><option>Trung tâm TP Vinh</option></select></div>
        <div class="col-12"><label class="form-label">Địa chỉ</label><input class="form-control" name="address"></div>
        <div class="col-md-4"><label class="form-label">Giá thuê</label><input type="number" class="form-control" name="price"></div>
        <div class="col-md-4"><label class="form-label">Diện tích</label><input type="number" class="form-control" name="area"></div>
        <div class="col-md-4"><label class="form-label">Số điện thoại liên hệ</label><input class="form-control" name="phone"></div>
        <div class="col-12"><label class="form-label">Tiện ích kèm theo</label><div class="row g-2">
          <div class="col-md-4"><label><input type="checkbox" name="utilities" value="Wifi"> Wifi</label></div><div class="col-md-4"><label><input type="checkbox" name="utilities" value="Máy lạnh"> Máy lạnh</label></div><div class="col-md-4"><label><input type="checkbox" name="utilities" value="Chỗ để xe"> Chỗ để xe</label></div>
          <div class="col-md-4"><label><input type="checkbox" name="utilities" value="Gác lửng"> Gác lửng</label></div><div class="col-md-4"><label><input type="checkbox" name="utilities" value="Nhà vệ sinh riêng"> Nhà vệ sinh riêng</label></div><div class="col-md-4"><label><input type="checkbox" name="utilities" value="Không chung chủ"> Không chung chủ</label></div>
        </div></div>
        <div class="col-12"><label class="form-label">Mô tả chi tiết</label><textarea class="form-control" rows="5" name="description"></textarea></div>
        <div class="col-12"><label class="form-label">Ảnh phòng</label><input type="file" class="form-control" name="image" accept="image/*"></div>
        <div class="col-12"><button class="btn btn-primary">Đăng tin</button></div>
      </div>
    </form>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="assets/js/main.js"></script>
</body>
</html>
