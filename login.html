<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đăng nhập - PHONGTRO247</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body data-page="login">
  <nav class="navbar bg-white sticky-top"><div class="container"><a class="navbar-brand" href="index.html">PHONGTRO247</a><a href="index.html" class="btn btn-outline-primary">Trang chủ</a></div></nav>
  <main class="auth-wrapper">
    <div class="container"><div class="row justify-content-center"><div class="col-lg-5 col-md-7">
      <form id="loginForm" class="form-card">
        <h2 class="fw-bold mb-3">Đăng nhập</h2>
        <div class="mb-3"><label class="form-label">Email hoặc số điện thoại</label><input class="form-control" name="loginId" placeholder="email@example.com"></div>
        <div class="mb-3"><label class="form-label">Mật khẩu</label><input type="password" class="form-control" name="password"></div>
        <label class="form-label">Captcha</label>
        <div class="d-flex gap-2 mb-3"><div id="captchaText" class="captcha-box"></div><button id="refreshCaptcha" type="button" class="btn btn-outline-secondary"><i class="fa-solid fa-rotate"></i></button><input class="form-control" name="captcha" placeholder="Nhập captcha"></div>
        <button class="btn btn-primary w-100">Đăng nhập</button>
        <div class="d-flex justify-content-between mt-3"><a href="forgot-password.html">Quên mật khẩu?</a><a href="register.html">Đăng ký tài khoản</a></div>
      </form>
    </div></div></div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="assets/js/main.js"></script>
</body>
</html>
